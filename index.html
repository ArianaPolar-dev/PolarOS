<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolarOS - Advanced Desktop Environment</title>
<style>
  :root{
    --accent: #00d9ff;
    --accent-2: #00f0ff;
    --accent-dark: #0099cc;
    --bg-desktop-1: #0a1428;
    --bg-desktop-2: #0d1b2a;
    --bg-desktop-3: #1a2332;
    --taskbar-bg: rgba(10, 20, 40, 0.85);
    --taskbar-border: rgba(0, 217, 255, 0.1);
    --window-bg: rgba(15, 25, 45, 0.95);
    --window-border: rgba(0, 217, 255, 0.15);
    --titlebar-bg: rgba(8, 18, 35, 0.98);
    --titlebar-border: rgba(0, 217, 255, 0.2);
    --text-primary: #e0e8f0;
    --text-secondary: #8b9aac;
    --text-tertiary: #546b82;
    --danger: #ff3366;
    --warn: #ffb324;
    --ok: #00d95f;
    --info: #00d9ff;
    --font-ui: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    --radius: 12px;
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; overflow:hidden; font-family: var(--font-ui); }

  #root{ width:100vw; height:100vh; position:relative; background: linear-gradient(135deg, #0a1428 0%, #1a2332 100%); }

  /* ============ BOOT SCREEN ============ */
  #boot-screen{
    position:absolute; inset:0; background: linear-gradient(135deg, #0a1428, #1a2332);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index: 9999; color: var(--text-primary);
    transition: opacity 0.8s ease;
  }
  .boot-logo{
    width:80px; height:80px; margin-bottom: 36px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    box-shadow: 0 0 60px rgba(0, 217, 255, 0.6), inset 0 0 30px rgba(0, 255, 255, 0.2);
    animation: pulseLogo 2.2s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    color: #0a1428;
  }
  @keyframes pulseLogo{
    0%,100%{ transform: scale(1); box-shadow: 0 0 60px rgba(0, 217, 255, 0.6), inset 0 0 30px rgba(0, 255, 255, 0.2); }
    50%{ transform: scale(1.08); box-shadow: 0 0 80px rgba(0, 217, 255, 0.9), inset 0 0 40px rgba(0, 255, 255, 0.4); }
  }
  .boot-title{ font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 48px; color: var(--accent); text-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
  .boot-spinner{
    width: 260px; height: 4px; background: rgba(0, 217, 255, 0.1);
    border-radius: 4px; overflow:hidden; margin-bottom: 24px;
  }
  .boot-spinner-fill{
    height:100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 4px; transition: width 0.2s ease; box-shadow: 0 0 20px rgba(0, 217, 255, 0.8);
  }
  .boot-status{ font-size: 13px; color: var(--text-secondary); font-family: var(--font-mono); min-height: 20px; letter-spacing: 0.5px; }

  /* ============ LOGIN SCREEN ============ */
  #login-screen{
    position:absolute; inset:0; z-index: 9998;
    background: linear-gradient(135deg, var(--bg-desktop-1), var(--bg-desktop-2), var(--bg-desktop-3));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition: opacity 0.6s ease;
  }
  #login-screen.visible{ opacity:1; pointer-events:all; }
  .login-clock{ color: var(--accent); font-size: 64px; font-weight: 300; margin-bottom: 8px; letter-spacing: 2px; }
  .login-date{ color: var(--text-secondary); font-size: 15px; margin-bottom: 56px; letter-spacing: 0.5px; }
  .login-avatar{
    width: 120px; height: 120px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    display:flex; align-items:center; justify-content:center;
    font-size: 48px; color:#0a1428; font-weight:700; margin-bottom: 24px;
    box-shadow: 0 12px 40px rgba(0, 217, 255, 0.3);
  }
  .login-username{ color: var(--text-primary); font-size: 20px; margin-bottom: 32px; font-weight: 600; }
  .login-input{
    width: 280px; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--window-border);
    background: rgba(0, 217, 255, 0.08); color: var(--text-primary); font-size: 14px; outline:none; text-align:center;
    margin-bottom: 16px; transition: all 0.3s ease;
  }
  .login-input:focus{
    background: rgba(0, 217, 255, 0.12);
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
  }
  .login-input::placeholder{ color: var(--text-tertiary); }
  .login-btn{
    width: 280px; padding: 12px; border-radius: 8px; border:none; cursor:pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color:#0a1428; font-size: 15px; font-weight:700; letter-spacing: 0.5px;
    transition: all 0.3s ease; box-shadow: 0 0 30px rgba(0, 217, 255, 0.2);
  }
  .login-btn:hover{ 
    box-shadow: 0 0 40px rgba(0, 217, 255, 0.4), 0 8px 20px rgba(0, 217, 255, 0.2);
    transform: translateY(-2px);
  }
  .login-btn:active{ transform: translateY(0); }

  /* ============ DESKTOP ============ */
  #desktop{
    position:absolute; inset:0; z-index: 1;
    background: linear-gradient(135deg, var(--bg-desktop-1) 0%, var(--bg-desktop-2) 50%, var(--bg-desktop-3) 100%);
    opacity:0; transition: opacity 0.6s ease;
    overflow: hidden;
  }
  #desktop.visible{ opacity:1; }

  .desktop-icons{
    position:absolute; top: 24px; left: 20px;
    display:flex; flex-direction:column; gap: 20px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .desktop-icon{
    width: 88px; display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:pointer; padding: 10px 6px; border-radius: 12px; user-select:none;
    transition: all 0.2s ease;
  }
  .desktop-icon:hover{ background: rgba(0, 217, 255, 0.1); transform: scale(1.05); }
  .desktop-icon.selected{ background: rgba(0, 217, 255, 0.15); box-shadow: inset 0 0 15px rgba(0, 217, 255, 0.1); }
  .desktop-icon .icon-glyph{
    width: 48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-size: 24px; background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(0, 217, 255, 0.05));
    border: 1px solid rgba(0, 217, 255, 0.2);
  }
  .desktop-icon .icon-label{ color: var(--text-primary); font-size: 12px; text-align:center; line-height:1.3; font-weight: 500; }

  /* ============ WINDOWS ============ */
  .window{
    position:absolute; min-width: 400px; min-height: 280px;
    background: var(--window-bg); border: 1px solid var(--window-border);
    border-radius: var(--radius); box-shadow: var(--shadow-lg);
    display:flex; flex-direction:column; overflow:hidden;
    backdrop-filter: blur(20px);
    animation: windowOpen 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes windowOpen{
    from{ opacity:0; transform: scale(0.92) translateY(10px); }
    to{ opacity:1; transform: scale(1) translateY(0); }
  }
  .window.closing{ animation: windowClose 0.2s ease forwards; }
  @keyframes windowClose{
    from{ opacity:1; transform: scale(1); }
    to{ opacity:0; transform: scale(0.92) translateY(10px); }
  }
  .window.minimized{ display:none; }
  .window.maximized{ border-radius:0; }

  .titlebar{
    height: 40px; background: var(--titlebar-bg); display:flex; align-items:center;
    padding: 0 12px; gap:10px; cursor: default; flex-shrink:0;
    border-bottom: 1px solid var(--titlebar-border);
    user-select: none;
  }
  .titlebar .title-icon{ font-size: 16px; }
  .titlebar .title-text{ color: var(--text-primary); font-size: 13px; font-weight:600; flex:1; }
  .titlebar .win-controls{ display:flex; gap:8px; }
  .win-btn{
    width: 32px; height: 26px; border-radius: 6px; border:none; background:transparent;
    color: var(--text-secondary); display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 12px; transition: all 0.2s ease;
  }
  .win-btn:hover{ background: rgba(0, 217, 255, 0.1); color: var(--accent); }
  .win-btn.close-btn:hover{ background: rgba(255, 51, 102, 0.2); color: var(--danger); }

  .window-body{ flex:1; overflow:auto; position:relative; color: var(--text-primary); background: var(--window-bg); }

  .resize-handle{ position:absolute; right:0; bottom:0; width:16px; height:16px; cursor: nwse-resize; }

  /* ============ TASKBAR ============ */
  #taskbar{
    position:absolute; left:0; right:0; bottom:0; height: 52px; z-index: 5000;
    background: var(--taskbar-bg); border-top: 1px solid var(--taskbar-border);
    display:flex; align-items:center; padding: 0 10px; gap: 10px;
    backdrop-filter: blur(25px);
  }
  #start-btn{
    display:flex; align-items:center; gap:8px; height: 36px; padding: 0 14px;
    border-radius: 8px; border:1px solid transparent; background: transparent; cursor:pointer;
    color: var(--accent); font-size: 14px; font-weight: 700; transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }
  #start-btn:hover{ background: rgba(0, 217, 255, 0.1); border-color: rgba(0, 217, 255, 0.2); }
  #start-btn.active{ background: rgba(0, 217, 255, 0.15); border-color: var(--accent); }
  .start-logo{ width:20px; height:20px; border-radius:6px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); }

  #taskbar-search{
    height: 36px; width: 220px; border-radius: 8px; border: 1px solid var(--window-border);
    background: rgba(0, 217, 255, 0.08); color: var(--text-primary); padding: 0 12px; font-size: 13px; outline:none;
    transition: all 0.2s ease;
  }
  #taskbar-search:focus{
    background: rgba(0, 217, 255, 0.12);
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
  }
  #taskbar-search::placeholder{ color: var(--text-tertiary); }

  #taskbar-apps{ flex:1; display:flex; gap:6px; height:100%; align-items:center; overflow-x: auto; }
  .taskbar-app{
    height: 36px; padding: 0 12px; border-radius: 8px; display:flex; align-items:center; gap:6px;
    background: rgba(0, 217, 255, 0.06); color: var(--text-primary); font-size: 12.5px; cursor:pointer;
    border: 1px solid rgba(0, 217, 255, 0.1); transition: all 0.2s ease; white-space:nowrap;
    font-weight: 500;
  }
  .taskbar-app:hover{ background: rgba(0, 217, 255, 0.12); border-color: rgba(0, 217, 255, 0.2); }
  .taskbar-app.active{ background: rgba(0, 217, 255, 0.18); border-color: var(--accent); box-shadow: inset 0 0 10px rgba(0, 217, 255, 0.1); }

  #tray{ display:flex; align-items:center; gap: 16px; color: var(--text-secondary); font-size: 12px; padding: 0 12px; }
  #tray .tray-icons{ display:flex; gap:10px; font-size: 14px; }
  #clock-tray{ text-align:right; line-height:1.4; cursor:default; }
  #clock-tray .time{ font-size: 13px; font-weight: 600; color: var(--accent); }
  #clock-tray .date{ font-size: 11px; color: var(--text-tertiary); }

  /* ============ START MENU ============ */
  #start-menu{
    position:absolute; left: 10px; bottom: 62px; width: 380px; z-index: 6000;
    background: var(--window-bg); border:1px solid var(--window-border); border-radius: 12px;
    box-shadow: var(--shadow-lg); backdrop-filter: blur(25px);
    display:none; flex-direction:column; padding: 20px; color: var(--text-primary);
    max-height: 600px;
  }
  #start-menu.visible{ display:flex; animation: menuOpen 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes menuOpen{ from{ opacity:0; transform: translateY(10px); } to{ opacity:1; transform: translateY(0); } }
  .start-menu-header{ font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing:1px; margin-bottom:16px; font-weight: 700; }
  .start-menu-grid{ display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .start-app{
    display:flex; flex-direction:column; align-items:center; gap:8px; padding: 12px 8px;
    border-radius: 10px; cursor:pointer; user-select:none; transition: all 0.2s ease;
  }
  .start-app:hover{ background: rgba(0, 217, 255, 0.1); transform: translateY(-2px); }
  .start-app .icon-glyph{ width:40px; height:40px; border-radius:10px; background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(0, 217, 255, 0.05)); display:flex; align-items:center; justify-content:center; font-size:20px; border: 1px solid rgba(0, 217, 255, 0.2); }
  .start-app .icon-label{ font-size: 11px; text-align:center; color: var(--text-primary); font-weight: 500; }
  .start-menu-footer{
    border-top: 1px solid rgba(0, 217, 255, 0.1); padding-top: 16px; display:flex; align-items:center; justify-content:space-between;
  }
  .start-user{ display:flex; align-items:center; gap:10px; font-size:13px; font-weight: 600; }
  .start-user .mini-avatar{ width:32px; height:32px; border-radius:8px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color: #0a1428; }
  .power-btn{ background: transparent; border:1px solid rgba(255, 51, 102, 0.2); color: var(--danger); cursor:pointer; font-size: 16px; padding: 8px 10px; border-radius:8px; transition: all 0.2s ease; }
  .power-btn:hover{ background: rgba(255, 51, 102, 0.1); border-color: var(--danger); }

  /* ============ TERMINAL APP ============ */
  .terminal-app{
    background: #080d15; color: #c9d1d9; font-family: var(--font-mono); font-size: 13px;
    height:100%; padding: 14px 16px; overflow-y:auto; white-space: pre-wrap; line-height:1.6;
  }
  .terminal-line{ margin: 0; }
  .term-prompt{ color: var(--ok); font-weight: 600; }
  .term-path{ color: var(--accent); font-weight: 500; }
  .terminal-input-row{ display:flex; gap:6px; }
  .terminal-input-row input{
    flex:1; background:transparent; border:none; outline:none; color: var(--text-primary); font-family: var(--font-mono); font-size:13px;
  }
  .term-error { color: var(--danger); }
  .term-warn { color: var(--warn); }
  .term-info { color: var(--info); }

  /* ============ FILE EXPLORER ============ */
  .explorer-app{ display:flex; height:100%; flex-direction: column; }
  .explorer-navbar{
    height: 48px; background: rgba(0, 217, 255, 0.05); border-bottom: 1px solid var(--window-border);
    padding: 0 14px; display:flex; align-items:center; gap: 12px; flex-shrink:0;
  }
  .explorer-navbar button{
    background: rgba(0, 217, 255, 0.1); border: none; color: var(--accent); padding: 8px 12px;
    border-radius: 6px; cursor:pointer; font-size: 12px; transition: all 0.2s ease;
  }
  .explorer-navbar button:hover{ background: rgba(0, 217, 255, 0.15); }
  .explorer-sidebar{
    width: 180px; background: rgba(0, 217, 255, 0.03); border-right: 1px solid var(--window-border);
    padding: 12px 8px; flex-shrink:0; overflow-y: auto;
  }
  .explorer-sidebar .sb-item{
    padding: 8px 10px; font-size:12.5px; border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:10px;
    color: var(--text-secondary); transition: all 0.2s ease; font-weight: 500;
  }
  .explorer-sidebar .sb-item:hover{ background: rgba(0, 217, 255, 0.08); color: var(--text-primary); }
  .explorer-sidebar .sb-item.active{ background: rgba(0, 217, 255, 0.15); color: var(--accent); border-left: 3px solid var(--accent); }
  .explorer-main{ flex:1; padding: 16px; overflow:auto; }
  .explorer-path-bar{
    font-size: 12px; color: var(--text-secondary); margin-bottom: 16px; padding: 8px 12px;
    background: rgba(0, 217, 255, 0.06); border-radius: 8px; font-family: var(--font-mono);
    border: 1px solid rgba(0, 217, 255, 0.1);
  }
  .explorer-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 16px; }
  .explorer-item{ display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; padding:10px 6px; border-radius:10px; transition: all 0.2s ease; }
  .explorer-item:hover{ background: rgba(0, 217, 255, 0.1); transform: translateY(-2px); }
  .explorer-item .icon-glyph{ width:48px; height:48px; border-radius:10px; background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(0, 217, 255, 0.05)); display:flex; align-items:center; justify-content:center; font-size:24px; border: 1px solid rgba(0, 217, 255, 0.2); }
  .explorer-item .icon-label{ font-size: 11px; text-align:center; color: var(--text-primary); font-weight: 500; }

  /* ============ NOTEPAD / TEXT EDITOR ============ */
  .notepad-app{ height:100%; display:flex; flex-direction: column; }
  .notepad-toolbar{
    height: 44px; background: rgba(0, 217, 255, 0.05); border-bottom: 1px solid var(--window-border);
    padding: 0 12px; display:flex; align-items:center; gap: 10px; flex-shrink:0;
  }
  .notepad-toolbar button{
    background: transparent; border: 1px solid rgba(0, 217, 255, 0.2); color: var(--text-secondary);
    padding: 6px 12px; border-radius: 6px; cursor:pointer; font-size: 12px; transition: all 0.2s ease;
  }
  .notepad-toolbar button:hover{ background: rgba(0, 217, 255, 0.1); color: var(--accent); border-color: var(--accent); }
  .notepad-app textarea{
    flex:1; border:none; outline:none; resize:none; background: transparent;
    color: var(--text-primary); font-family: var(--font-mono); font-size:13px; padding: 16px; line-height:1.7;
  }

  /* ============ SETTINGS APP ============ */
  .settings-app{ padding: 20px; overflow-y: auto; }
  .settings-app h3{ margin: 0 0 8px; font-size: 15px; font-weight: 700; color: var(--accent); }
  .settings-app .settings-section{ margin-bottom: 28px; }
  .settings-row{ display:flex; align-items:center; justify-content:space-between; padding: 12px 0; border-bottom: 1px solid rgba(0, 217, 255, 0.08); font-size:13px; }
  .theme-options{ display:flex; gap:12px; }
  .theme-swatch{ width: 52px; height: 36px; border-radius:8px; cursor:pointer; border: 2px solid transparent; transition: all 0.2s ease; }
  .theme-swatch:hover{ transform: scale(1.05); }
  .theme-swatch.active{ border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }

  /* ============ NOTIFICATIONS ============ */
  #notification-stack{
    position:absolute; top: 20px; right: 20px; z-index: 7000; display:flex; flex-direction:column; gap:12px; width: 340px;
    pointer-events: none;
  }
  .notification{
    background: var(--window-bg); border:1px solid var(--window-border); border-radius:12px;
    backdrop-filter: blur(20px); padding: 14px 16px; color: var(--text-primary); box-shadow: var(--shadow-md);
    animation: notifIn 0.3s ease; pointer-events: all;
  }
  @keyframes notifIn{ from{ opacity:0; transform: translateX(40px); } to{ opacity:1; transform: translateX(0); } }
  .notification.closing{ animation: notifOut 0.2s ease forwards; }
  @keyframes notifOut{ to{ opacity:0; transform: translateX(40px); } }
  .notification .notif-title{ font-size:13px; font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .notification .notif-body{ font-size:12px; color: var(--text-secondary); }

  /* ============ CONTEXT MENU ============ */
  #context-menu{
    position:absolute; z-index: 8000; background: var(--window-bg); border:1px solid var(--window-border);
    border-radius: 10px; min-width: 200px; padding: 6px; display:none; backdrop-filter: blur(20px);
    box-shadow: var(--shadow-md);
  }
  #context-menu.visible{ display:block; animation: contextIn 0.15s ease; }
  @keyframes contextIn{ from{ opacity:0; transform: scale(0.95); } to{ opacity:1; transform: scale(1); } }
  .ctx-item{ padding: 9px 12px; font-size: 12.5px; color: var(--text-primary); border-radius:6px; cursor:pointer; transition: all 0.2s ease; font-weight: 500; }
  .ctx-item:hover{ background: rgba(0, 217, 255, 0.12); color: var(--accent); }
  .ctx-sep{ height:1px; background: rgba(0, 217, 255, 0.1); margin: 6px 0; }

  ::-webkit-scrollbar{ width: 10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background: rgba(0, 217, 255, 0.2); border-radius: 6px; transition: background 0.2s; }
  ::-webkit-scrollbar-thumb:hover{ background: rgba(0, 217, 255, 0.35); }
  ::-webkit-scrollbar-track{ background: transparent; }
</style>
</head>
<body>

<div id="root">

  <!-- BOOT SCREEN -->
  <div id="boot-screen">
    <div class="boot-logo">P</div>
    <div class="boot-title">POLARON</div>
    <div class="boot-spinner"><div class="boot-spinner-fill" id="boot-fill"></div></div>
    <div class="boot-status" id="boot-status">Initializing kernel…</div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-clock" id="login-clock">00:00</div>
    <div class="login-date" id="login-date">Loading…</div>
    <div class="login-avatar">A</div>
    <div class="login-username">ariana</div>
    <input class="login-input" id="login-password" type="password" placeholder="Password">
    <button class="login-btn" id="login-btn">Sign In</button>
  </div>

  <!-- DESKTOP -->
  <div id="desktop">
    <div class="desktop-icons" id="desktop-icons"></div>
    <div id="windows-layer"></div>
  </div>

  <!-- START MENU -->
  <div id="start-menu"></div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button id="start-btn">
      <div class="start-logo"></div> POLARON
    </button>
    <input id="taskbar-search" placeholder="Search applications…">
    <div id="taskbar-apps"></div>
    <div id="tray">
      <div class="tray-icons">🌐 🔊 🔋 🛡️</div>
      <div id="clock-tray">
        <div class="time" id="tray-time">00:00</div>
        <div class="date" id="tray-date">--/--</div>
      </div>
    </div>
  </div>

  <!-- NOTIFICATIONS -->
  <div id="notification-stack"></div>

  <!-- CONTEXT MENU -->
  <div id="context-menu"></div>

</div>

<script src="apps.js"></script>
<script src="system.js"></script>
</body>
</html>
